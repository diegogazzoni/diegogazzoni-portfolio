<section id="contacts" class="section contacts">
  <div class="section__header">
    <div>
      <p class="eyebrow">Contacts</p>
      <h2>Restiamo in contatto</h2>
      <p class="section__lede">Attualmente disponibile per nuove opportunità.<br>Hai un progetto in mente o vuoi parlare di AI & Dev? Scrivimi.</p>
      <p style="margin-top: 12px; font-size: 14px; font-weight: 600; color: var(--muted);">
        Based in Italy (Cesena/Bologna) · Open to Remote
      </p>

      <div class="contact-ctas">
        <a class="button" href="https://linkedin.com/in/diegogazzoni" target="_blank" rel="noreferrer">LinkedIn</a>
        <a class="button" href="https://github.com/diegogazzoni" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </div>
  </div>

  <form class="contact-form" action="#" method="post">
    <h3 style="margin: 0;">Invia una mail</h3>
    <label class="input">
      <span>Nome</span>
      <input type="text" name="name" placeholder="Il tuo nome" required>
    </label>
    <label class="input">
      <span>Email</span>
      <input type="email" name="email" placeholder="you@example.com" required>
    </label>
    <label class="input">
      <span>Messaggio</span>
      <textarea name="message" rows="9" placeholder="Scrivi qui..." required></textarea>
    </label>
    <button class="button" type="submit">Invia Messaggio</button>
  </form>
</section>
