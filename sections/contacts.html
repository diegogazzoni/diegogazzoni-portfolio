<section id="contacts" class="section contacts">
  <div class="section__header">
    <div>
      <p class="eyebrow">Contacts</p>
      <h2>Restiamo in contatto</h2>
      <p class="section__lede">CTA rapide + un form essenziale per messaggi diretti.</p>
    </div>
  </div>

  <div class="contacts__grid">
    <div class="contact-ctas">
      <a class="button" href="mailto:diego.gazzoni33@gmail.com">Email</a>
      <a class="button ghost" href="https://linkedin.com/in/diegogazzoni" target="_blank" rel="noreferrer">LinkedIn</a>
      <a class="button ghost" href="https://github.com/diegogazzoni" target="_blank" rel="noreferrer">GitHub</a>
    </div>

    <form class="contact-form" action="#" method="post">
      <label class="input">
        <span>Nome</span>
        <input type="text" name="name" placeholder="Il tuo nome" required>
      </label>
      <label class="input">
        <span>Email</span>
        <input type="email" name="email" placeholder="you@example.com" required>
      </label>
      <label class="input">
        <span>Messaggio</span>
        <textarea name="message" rows="4" placeholder="Scrivi qui" required></textarea>
      </label>
      <button class="button" type="submit">Invia</button>
    </form>
  </div>
</section>
